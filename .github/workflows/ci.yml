# Repository correctness gate. Hand-written on purpose: this must run the full
# test sweep even when a change breaks the workflow generator, so it does not
# depend on Ariadne emitting it. The generated build-*.yml workflows are product
# demos of Ariadne; this is the gate that keeps the tree green.
name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  # Rust tests + the loom binary, and validation of the CI definition itself: the
  # committed TIR must plan cleanly so a broken workflow graph fails the gate, not
  # just at generation time. Rust-only so it holds even if the frontend is broken.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # --workspace is load-bearing: plain `cargo test` only tests the root
      # `ariadne` package and skips the loom and ariadne-py crates.
      - name: cargo test (workspace)
        run: cargo test --workspace --locked
      - name: build loom
        run: cargo build --locked --release -p loom
      - name: loom check (TIR is valid)
        run: ./target/release/loom check ci/main.tir.json
      - name: loom explain (plan is producible)
        run: ./target/release/loom explain ci/main.tir.json github -O3 --profile ci/profile.json

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install build tooling
        run: pip install maturin pytest
      # Build the ariadne extension wheel and install it, then run the frontend
      # test suite against the installed package.
      - name: build + install ariadne wheel
        run: |
          cd frontends/python
          maturin build --release --out dist
          pip install dist/*.whl
      - name: pytest (python frontend)
        run: cd frontends/python && pytest tests/ -q
      # The committed TIR must match what main.py generates, so the loom job
      # above isn't fooled by a stale graph. Only main.tir.json is diffed: it is
      # the semantic graph (profile-independent), whereas main.yml legitimately
      # drifts as the [skip ci] profile loop recommits fresh timings.
      - name: committed TIR is up to date
        run: |
          python ci/main.py
          git diff --exit-code ci/main.tir.json
