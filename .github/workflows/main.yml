name: main_ci
on:
  push:
    branches:
    - main
jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Upload artifact checkout/src
      uses: actions/upload-artifact@v4
      with:
        name: checkout/src
        path: checkout/src
  rust-fmt:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run rust_fmt
      run: cargo fmt --all -- --check
  rust-docs:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run rust_docs
      run: cargo doc --no-deps --workspace
    - name: Upload artifact rust_docs/docs
      uses: actions/upload-artifact@v4
      with:
        name: rust_docs/docs
        path: target/doc
        retention-days: '1'
  rust-coverage:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run rust_coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info
    - name: Upload artifact rust_coverage/coverage
      uses: actions/upload-artifact@v4
      with:
        name: rust_coverage/coverage
        path: lcov.info
        retention-days: '1'
  python-fmt:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run python_fmt
      run: ruff format --check frontends/python
  refresh-profile:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run refresh_profile
      run: |-
        cargo build --release -p loom
        ./target/release/loom profile github --workflow main.yml --runs 20 --out profile.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload artifact refresh_profile/profile
      uses: actions/upload-artifact@v4
      with:
        name: refresh_profile/profile
        path: profile.json
        retention-days: '30'
  test-workspace:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run build_loom
      run: cargo build --release --package loom
    - name: Run test_workspace
      run: cargo test --workspace -- --test-threads=4
    - name: Upload artifact test_workspace/report
      uses: actions/upload-artifact@v4
      with:
        name: test_workspace/report
        path: test-results.xml
        retention-days: '1'
  build-wheel:
    runs-on: ubuntu-latest
    needs:
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Run build_core_ext
      run: cargo build --lib --release --package ariadne-py
    - name: Run build_wheel
      run: maturin build --release --manifest-path crates/ariadne-py/Cargo.toml --out dist
    - name: Upload artifact build_wheel/wheel
      uses: actions/upload-artifact@v4
      with:
        name: build_wheel/wheel
        path: dist/*.whl
        retention-days: '1'
  test-wheel:
    runs-on: ubuntu-latest
    needs:
    - build-wheel
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Download artifact build_wheel/wheel
      uses: actions/download-artifact@v4
      with:
        name: build_wheel/wheel
    - name: Run test_wheel
      run: cargo test -v
    - name: Upload artifact test_wheel/report
      uses: actions/upload-artifact@v4
      with:
        name: test_wheel/report
        path: py-test-results.xml
        retention-days: '1'
  python-docs:
    runs-on: ubuntu-latest
    needs:
    - build-wheel
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Download artifact build_wheel/wheel
      uses: actions/download-artifact@v4
      with:
        name: build_wheel/wheel
    - name: Run python_docs
      run: pdoc -o frontends/python/docs ariadne
    - name: Upload artifact python_docs/docs
      uses: actions/upload-artifact@v4
      with:
        name: python_docs/docs
        path: frontends/python/docs
        retention-days: '1'
  python-coverage:
    runs-on: ubuntu-latest
    needs:
    - build-wheel
    - checkout
    steps:
    - name: Download artifact checkout/src
      uses: actions/download-artifact@v4
      with:
        name: checkout/src
    - name: Download artifact build_wheel/wheel
      uses: actions/download-artifact@v4
      with:
        name: build_wheel/wheel
    - name: Run python_coverage
      run: pytest frontends/python/tests --cov=ariadne --cov-report=xml:py-coverage.xml
    - name: Upload artifact python_coverage/coverage
      uses: actions/upload-artifact@v4
      with:
        name: python_coverage/coverage
        path: py-coverage.xml
        retention-days: '1'
