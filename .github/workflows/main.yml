name: main_ci
on:
  push:
    branches:
    - main
jobs:
  refresh-profile:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run refresh_profile
      run: |-
        cargo build --release -p loom
        ./target/release/loom profile github --workflow main.yml --runs 20 --out profile.json
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload artifact refresh_profile-profile
      uses: actions/upload-artifact@v4
      with:
        name: refresh_profile-profile
        path: profile.json
        retention-days: '1'
  rust-fmt-and-rust-docs-and-rust-coverage-and-build-loom-and-test-workspace:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install dependencies
      run: cargo install cargo-llvm-cov
    - name: Run rust_fmt
      run: cargo fmt --all -- --check
    - name: Run rust_docs
      run: cargo doc --no-deps --workspace
    - name: Upload artifact rust_docs-docs
      uses: actions/upload-artifact@v4
      with:
        name: rust_docs-docs
        path: target/doc
        retention-days: '1'
    - name: Run rust_coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info
    - name: Upload artifact rust_coverage-coverage
      uses: actions/upload-artifact@v4
      with:
        name: rust_coverage-coverage
        path: lcov.info
        retention-days: '1'
    - name: Run build_loom
      run: cargo build --release --package loom
    - name: Run test_workspace
      run: cargo test --workspace -- --test-threads=4
    - name: Upload artifact test_workspace-report
      uses: actions/upload-artifact@v4
      with:
        name: test_workspace-report
        path: test-results.xml
        retention-days: '1'
  python-fmt-and-build-core-ext-and-build-wheel-and-install-wheel-and-test-wheel-and-python-docs-and-python-coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install dependencies
      run: |-
        pip install pytest
        pip install pdoc
        pip install pytest-cov
        pip install maturin
        pip install ruff
    - name: Run python_fmt
      run: ruff format --check frontends/python
    - name: Run build_core_ext
      run: cargo build --lib --release --package ariadne-py
    - name: Run build_wheel
      run: maturin build --release --manifest-path crates/ariadne-py/Cargo.toml --out dist
    - name: Run install_wheel
      run: pip install dist/*.whl
    - name: Run test_wheel
      run: pytest frontends/python/tests/ -v
    - name: Upload artifact test_wheel-report
      uses: actions/upload-artifact@v4
      with:
        name: test_wheel-report
        path: py-test-results.xml
        retention-days: '1'
    - name: Run python_docs
      run: pdoc -o frontends/python/docs ariadne
    - name: Upload artifact python_docs-docs
      uses: actions/upload-artifact@v4
      with:
        name: python_docs-docs
        path: frontends/python/docs
        retention-days: '1'
    - name: Run python_coverage
      run: pytest frontends/python/tests --cov=ariadne --cov-report=xml:py-coverage.xml
    - name: Upload artifact python_coverage-coverage
      uses: actions/upload-artifact@v4
      with:
        name: python_coverage-coverage
        path: py-coverage.xml
        retention-days: '1'
