name: Simple Build and Test
on:
  push:
    branches:
    - main
  pull_request: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Run build
      run: cargo build --release
    - name: Upload artifact binary
      uses: actions/upload-artifact@v4
      with:
        name: binary
        path: binary
  test:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: Download artifact binary
      uses: actions/download-artifact@v4
      with:
        name: binary
    - name: Run test
      run: cargo test
    - name: Upload artifact test-report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-report
